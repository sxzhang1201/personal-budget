site_name: Personal Budget
site_description: Personal expense dashboard
site_url: https://sxzhang1201.github.io/personal-budget/

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Dashboard: dashboard.html

hooks:
  - docs/hooks.py

copyright: Personal budget
