site_name: Personal Budget Documentation
site_description: Local expense tracking, budget months, and reporting
site_url: https://sxzhang1201.github.io/personal-budget/
repo_url: https://github.com/sxzhang1201/personal-budget
repo_name: sxzhang1201/personal-budget
edit_uri: edit/master/docs/

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - content.code.copy
    - content.tooltips

nav:
  - Home: index.md
  - Where data lives: where-data-lives.md
  - Site usage: site-usage.md
  - Workflows:
      - workflows/index.md
      - Add expenses: workflows/add-expenses.md
      - Monthly summary: workflows/monthly-summary.md
      - Dashboard: workflows/dashboard.md
  - Systems:
      - systems/index.md
      - Expense data: systems/expense-data.md
      - Scripts: systems/scripts.md
  - Rules:
      - Budget month: rules/budget-month.md
  - Dashboard (live): dashboard.html

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sxzhang1201/personal-budget

copyright: Personal budget project — local-first, no cloud storage.
